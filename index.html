<!doctype html>
<html lang="en">
  <head>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#00b4d8" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Dolphins Card" />
    <link rel="apple-touch-icon" href="/Logo_centrato-192.png" />
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then((reg) => console.log('Service Worker registrato con successo!', reg.scope))
        .catch((err) => console.log('Errore nella registrazione del Service Worker:', err));
    });
  }
</script>
  </body>
</html>
